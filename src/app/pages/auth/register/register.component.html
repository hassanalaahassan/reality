<!-- Header -->
<div class="mb-4 text-center">
  <h2 class="text-3xl font-bold text-realty-blue-500">Reality</h2>
  <p class="mt-2 text-realty-gray-600">Create your account</p>
</div>

<!-- Form -->
<form>
  <!-- Full Name -->
  <app-form-field
    label="Full Name"
    fieldId="username"
    type="text"
    placeholder="Full Name"
    [value]="form().username"
    [error]="errors().username"
    [touched]="!!touched().username"
    (valueChange)="update('username', $event)"
    (fieldBlur)="markTouched('username')"
  />

  <!-- Email -->
  <app-form-field
    label="Email"
    fieldId="email"
    type="email"
    placeholder="Email"
    [value]="form().email"
    [error]="errors().email"
    [touched]="!!touched().email"
    (valueChange)="update('email', $event)"
    (fieldBlur)="markTouched('email')"
  />

  <!-- Password -->
  <app-form-field
    label="Password"
    fieldId="password"
    type="password"
    placeholder="Password"
    [value]="form().password"
    [error]="errors().password"
    [touched]="!!touched().password"
    (valueChange)="update('password', $event)"
    (fieldBlur)="markTouched('password')"
  />

  <!-- Confirm Password -->
  <app-form-field
    label="Confirm Password"
    fieldId="confirmPassword"
    type="password"
    placeholder="Confirm Password"
    [value]="form().confirmPassword"
    [error]="errors().confirmPassword"
    [touched]="!!touched().confirmPassword"
    (valueChange)="update('confirmPassword', $event)"
    (fieldBlur)="markTouched('confirmPassword')"
  />

  <!-- Phone -->
  <app-form-field
    label="Phone"
    fieldId="phone"
    type="tel"
    placeholder="Phone"
    [value]="form().phone"
    [error]="errors().phone"
    [touched]="!!touched().phone"
    (valueChange)="update('phone', $event)"
    (fieldBlur)="markTouched('phone')"
  />

  <!-- Profile Picture -->
  <div class="mb-4">
    <label
      for="profile-pic"
      class="block text-sm font-medium text-realty-blue-800"
    >
      Profile Picture
    </label>
    <div class="mt-1 flex items-center gap-3">
      <label
        for="profile-pic"
        class="cursor-pointer rounded-md bg-realty-cream-100 px-4 py-2 text-sm font-medium text-realty-blue-800 hover:bg-realty-cream-200 focus:outline-none focus:ring-2 focus:ring-realty-terracotta-500 transition-colors duration-200"
      >
        Choose File
      </label>
      <span class="text-sm text-realty-gray-500">
        {{ form().file?.name || "No file chosen" }}
      </span>
    </div>
    <input
      type="file"
      id="profile-pic"
      name="profilePic"
      accept="image/*"
      class="hidden"
      (change)="onFileSelected($event)"
    />
    <p class="mt-1 text-xs text-realty-gray-400">
      Accepted formats: JPG, PNG, GIF (max 2MB)
    </p>
    @if (touched().file && errors().file) {
      <p class="mt-1 text-sm text-realty-terracotta-500 animate-fade-in">
        {{ errors().file }}
      </p>
    }
  </div>

  <!-- User Type (Radio) -->
  <fieldset class="mb-4">
    <legend class="block text-sm font-medium text-realty-blue-800 mb-2">
      I am a:
    </legend>
    <div class="flex flex-col sm:flex-row sm:gap-6 gap-2">
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="radio"
          name="userType"
          value="user"
          class="h-4 w-4 accent-realty-terracotta-500 border-realty-gray-300 focus:ring-realty-terracotta-500"
          [checked]="form().userType === 'user'"
          (change)="update('userType', 'user')"
          (blur)="markTouched('userType')"
        />
        User
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="radio"
          name="userType"
          value="agent"
          class="h-4 w-4 accent-realty-terracotta-500 border-realty-gray-300 focus:ring-realty-terracotta-500"
          [checked]="form().userType === 'agent'"
          (change)="update('userType', 'agent')"
          (blur)="markTouched('userType')"
        />
        Agent
      </label>
    </div>
    @if (touched().userType && errors().userType) {
      <p class="mt-1 text-sm text-realty-terracotta-500 animate-fade-in">
        {{ errors().userType }}
      </p>
    }
  </fieldset>

  <!-- Submit button -->
  <button
    type="button"
    (click)="onSubmit()"
    class="w-full rounded-md bg-realty-terracotta-500 px-4 py-2 text-white hover:bg-realty-terracotta-600 focus:outline-none focus:ring-2 focus:ring-realty-terracotta-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200"
    [disabled]="loading() || !isFormValid()"
  >
    @if (loading()) {
      <span class="inline-flex items-center gap-2">
        <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
          ></path>
        </svg>
        Creating...
      </span>
    } @else {
      Sign Up
    }
  </button>

  <!-- Login link -->
  <p class="mt-3 text-center text-sm text-realty-gray-600">
    Already have an account?
    <a
      routerLink="/login"
      class="font-medium text-realty-terracotta-500 hover:underline cursor-pointer"
    >
      Sign in
    </a>
  </p>
</form>
