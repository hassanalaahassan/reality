<div class="container mx-auto px-4">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold text-realty-blue-900">
      Available Properties
    </h2>
  </div>

  <div class="properties-container">
    @if (isLoading()) {
      <!-- Skeletons -->
      @for (item of skeletonArray; track $index) {
        <app-card [isLoading]="true" [property]="null!"/>
      }
    } @else {
      <!-- Real Data -->
      @for (prop of properties(); track prop.id) {
        <app-card [property]="prop" [isFavorite]="checkPropertyFav(prop.id+'')" [isLoading]="false" (favoriteToggle)="onToggleFavorite($event)"/>
      }

      @if (properties().length === 0) {
        <div class="col-span-full py-8 text-center text-realty-gray-500">
          <svg
            class="w-16 h-16 mx-auto mb-4 text-realty-gray-300"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
            />
          </svg>
          <p class="text-xl font-medium">No properties found</p>
          <p class="mt-2 text-sm">Be the first to add a property!</p>
        </div>
      }
    }
  </div>
</div>
