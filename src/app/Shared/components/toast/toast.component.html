<!-- Toast Container - fixed top right -->
<div
  class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none max-w-sm w-full"
>
  <div
    *ngFor="let toast of toasts()"
    [class]="getClasses(toast)"
    class="pointer-events-auto"
  >
    <div class="flex items-center space-between w-full gap-2">
        <!-- Icon -->
    <span class="text-lg flex-shrink-0 mt-0.5">{{ getIcon(toast.type) }}</span>

    <!-- Message -->
    <p class="flex-1 text-lg font-medium leading-snug">{{ toast.message }}</p>

    <!-- Dismiss button -->
    <button
      (click)="dismiss(toast.id)"
      class="flex-shrink-0 text-current opacity-50 hover:opacity-100 transition-opacity p-0.5 -mt-0.5"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
    </div>
  </div>
</div>
