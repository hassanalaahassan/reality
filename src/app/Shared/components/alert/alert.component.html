@if (message()) {
  <div
    class="mb-4 flex items-center rounded-lg border p-4 text-sm animate-fade-in"
    [class]="typeClasses"
    role="alert"
  >
    <!-- Icon -->
    <svg
      class="mr-3 inline h-4 w-4 shrink-0"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      fill="currentColor"
      viewBox="0 0 20 20"
    >
      <path [attr.d]="iconPath" />
    </svg>

    <!-- Message -->
    <span class="flex-1">{{ message() }}</span>

    <!-- Dismiss button -->
    @if (dismissible()) {
      <button
        type="button"
        class="-mx-1.5 -my-1.5 ml-auto inline-flex h-8 w-8 items-center justify-center rounded-lg p-1.5 opacity-60 transition-opacity hover:opacity-100 focus:ring-2 focus:ring-offset-1"
        (click)="onDismiss()"
        aria-label="Dismiss"
      >
        <svg
          class="h-3.5 w-3.5"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 14 14"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
          />
        </svg>
      </button>
    }
  </div>
}
